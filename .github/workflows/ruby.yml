# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will download a prebuilt Ruby version, install dependencies and run tests with Rake
# For more information see: https://github.com/marketplace/actions/setup-ruby-jruby-and-truffleruby

name: Ruby

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    #runs-on: blacksmith-4vcpu-ubuntu-2404
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['3.4.9','4.0.2']
    services:
      memcached:
        image: memcached:latest
        ports:
          - 11211:11211
    env:
      AHA_SECRET_MEMCACHE_URL: "localhost:11211"
      undercover_version: 'DEACTIVATED_SET_3.4.2_TO_REACTIVATE'
      RACK_ENV: test

    steps:
      - uses: actions/checkout@v3
      - name: Set up Ruby
      # To automatically get bug fixes and new Ruby versions for ruby/setup-ruby,
      # change this to (see https://github.com/ruby/setup-ruby#versioning):
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler: '4.0.3'
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
        env:
          BUNDLE_CACHE_VERSION: v2
      - name: Prepare overcommit
        run: |
          git config --global user.email "gh-actions@example.com"
          git config --global user.name "GitHub Actions"
          bundle exec overcommit --sign
      - name: Run pre-commit checks
        run: bundle exec overcommit --run pre-commit
      - name: Create db and run migrations
        run: |
          bundle exec rake db:create
          bundle exec rake db:schema:load
          sqlite3 db/database/test.sqlite3 "select * from schema_migrations"
      - name: Run brakeman
        run: bundle exec brakeman
      - name: Run tests with coverage
        if: ${{ matrix.ruby-version == env.undercover_version }}
        env:
          COVERAGE: "true"
        run: bundle exec rspec
      # Run tests without coverage for other Ruby versions
      - name: Run tests
        if: ${{ matrix.ruby-version != env.undercover_version }}
        run: bundle exec rspec
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rspec-screenshots-ruby-${{ matrix.ruby-version }}-${{ github.run_id }}
          path: tmp/capybara
          if-no-files-found: ignore
          retention-days: 7
      # only upload coverage once
      - name: undercover
        if: ${{ matrix.ruby-version == env.undercover_version && github.ref_name == 'main' }}
        run: |
          ruby -e "$(curl -s https://undercover-ci.com/uploader.rb)" -- \
            --repo ${{ github.repository }} \
            --commit ${{ github.event.pull_request.head.sha || github.sha }} \
            --lcov /home/runner/_work/aha-secret/aha-secret/coverage/lcov/aha-secret.lcov
